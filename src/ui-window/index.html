<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>MidiRipples</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <div id="title-bar">
      <span class="title">MIDI RIPPLES</span>
      <span class="subtitle">shockwave</span>
    </div>
    <div id="controls"></div>
    <div id="preset-bar">
      <button class="preset-btn active" data-preset="crystal">Crystal</button>
      <button class="preset-btn" data-preset="silky">Silky</button>
      <button class="preset-btn" data-preset="angels">Angels</button>
    </div>
    <div id="volume-bar">
      <input type="range" id="volume" min="0" max="100" value="30">
    </div>
  </div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
